<div style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e2e8f0; min-height: 100vh; margin: -8px; padding-bottom: 50px;">

  <div style="background-color: #0f172a; color: white; padding: 30px 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center;">
    <h2 style="margin: 0; color: #38bdf8; font-size: 28px;">Mis Proyectos Angular</h2>
    <p style="margin: 5px 0 0 0; font-size: 16px; color: #94a3b8;">Ismael Morales Diaz</p>
  </div>

  <div style="max-width: 600px; margin: 40px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);">
    
    @if (proyectoActivo === 'inicio') {
      <div style="text-align: center; color: #334155;">
        <h1 style="color: #0f172a; font-size: 38px; margin-bottom: 10px;">¡Bienvenido!</h1>
        <p style="font-size: 18px; margin-bottom: 40px;">Selecciona una herramienta para comenzar a interactuar.</p>

        <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
          <button (click)="cambiarProyecto('suma')" style="background-color: #0284c7; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
            Ir a Sumadora
          </button>
          <button (click)="cambiarProyecto('factorial')" style="background-color: #0284c7; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
            Ir a Factorial
          </button>
        </div>
      </div>
    }

    @if (proyectoActivo === 'suma') {
      <div>
        <button (click)="cambiarProyecto('inicio')" style="background-color: transparent; color: #64748b; border: 1px solid #cbd5e1; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; font-weight: bold;">
          ← Volver al Inicio
        </button>
        <h2 style="color: #0f172a; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; text-align: center;">Proyecto 1: Sumadora</h2>
        <app-sumar-numeros></app-sumar-numeros>
      </div>
    }

    @if (proyectoActivo === 'factorial') {
      <div>
        <button (click)="cambiarProyecto('inicio')" style="background-color: transparent; color: #64748b; border: 1px solid #cbd5e1; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; font-weight: bold;">
          ← Volver al Inicio
        </button>
        <h2 style="color: #0f172a; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; text-align: center;">Proyecto 2: Calculadora Factorial</h2>
        <app-calcular-factorial></app-calcular-factorial>
      </div>
    }

  </div>
</div>
